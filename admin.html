<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin - บันทึกยอดน้ำมันรวม</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 p-4 text-slate-100 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 mt-10">
        <h2 class="text-2xl font-bold text-yellow-400 mb-2 text-center">ปตท.บ้านแฮด (Admin)</h2>
        <p class="text-slate-400 text-center text-sm mb-6">บันทึกปริมาณน้ำมันรวมทุกประเภท</p>

        <div class="space-y-5">
            <div>
                <label class="block mb-1 text-sm">สถานะการให้บริการ</label>
                <select id="status" class="w-full p-3 rounded-xl bg-slate-700 border-none text-white focus:ring-2 focus:ring-yellow-500">
                    <option value="open">🟢 เปิดให้บริการปกติ</option>
                    <option value="closed">🔴 ปิดให้บริการ</option>
                </select>
            </div>

            <div class="space-y-4 pt-4 border-t border-slate-700">
                <div>
                    <label class="block mb-1 text-sm text-slate-400">ปริมาณน้ำมันยกมา (เมื่อวาน)</label>
                    <input type="number" id="prev" class="w-full p-3 rounded-xl bg-slate-700 text-white text-lg" placeholder="0">
                </div>
                <div>
                    <label class="block mb-1 text-sm text-green-400">รับเพิ่มวันนี้ (+)</label>
                    <input type="number" id="rec" class="w-full p-3 rounded-xl bg-slate-700 text-white text-lg" placeholder="0">
                </div>
                <div>
                    <label class="block mb-1 text-sm text-red-400">ขายออกวันนี้ (-)</label>
                    <input type="number" id="sold" class="w-full p-3 rounded-xl bg-slate-700 text-white text-lg" placeholder="0">
                </div>
            </div>

            <button onclick="saveData()" class="w-full mt-6 bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black py-4 rounded-2xl shadow-lg transition-all text-xl">
                อัปเดตข้อมูลทันที
            </button>
            <p id="msg" class="text-center mt-4 text-green-400 font-bold opacity-0 transition-opacity">✅ บันทึกออนไลน์สำเร็จ!</p>
        </div>
    </div>

    <script>
        // *** วาง URL ของ Firebase ของคุณที่นี่ ***
        const FIREBASE_URL = "https://ptt-ban-had-default-rtdb.asia-southeast1.firebasedatabase.app/total_fuel.json";

        function saveData() {
            const data = {
                status: document.getElementById('status').value,
                lastUpdate: new Date().toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' }),
                prev: Number(document.getElementById('prev').value) || 0,
                rec: Number(document.getElementById('rec').value) || 0,
                sold: Number(document.getElementById('sold').value) || 0
            };

            fetch(FIREBASE_URL, {
                method: 'PUT',
                body: JSON.stringify(data)
            }).then(() => {
                const msg = document.getElementById('msg');
                msg.style.opacity = '1';
                setTimeout(() => { msg.style.opacity = '0'; }, 2000);
            });
        }
    </script>
</body>
</html>
