<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ปตท.บ้านแฮด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen p-4">
    <div class="max-w-4xl mx-auto">
        <header class="text-center my-8">
            <h1 class="text-4xl font-black text-blue-900">ปตท.บ้านแฮด</h1>
            <p id="time" class="text-gray-500 mt-2 italic text-sm">กำลังโหลดข้อมูล...</p>
        </header>

        <div id="displayArea" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>

        <footer class="mt-12 text-center">
            <a href="admin.html" class="text-gray-400 hover:text-blue-600 text-sm">⚙️ ส่วนสำหรับ Jobber บันทึกข้อมูล</a>
        </footer>
    </div>

    <script>
        const FIREBASE_URL = "https://ptt-ban-had-default-rtdb.asia-southeast1.firebasedatabase.app/fuel_report.json";

        function updateView() {
            fetch(FIREBASE_URL)
                .then(res => res.json())
                .then(data => {
                    if (!data) return;
                    document.getElementById('time').innerText = "อัปเดตล่าสุด: " + data.lastUpdate;
                    
                    const fuels = [
                        { name: "แก๊สโซฮอล์ 95", val: data.g95, color: "orange" },
                        { name: "แก๊สโซฮอล์ 91", val: data.g91, color: "green" },
                        { name: "ดีเซล", val: data.d, color: "blue" }
                    ];

                    const display = document.getElementById('displayArea');
                    display.innerHTML = '';

                    fuels.forEach(f => {
                        const total = f.val.prev + f.val.rec;
                        const remain = total - f.val.sold;
                        const percent = (remain / total) * 100 || 0;
                        
                        let barColor = "bg-green-500";
                        let statusText = "พร้อมให้บริการ";
                        if (remain <= 0) { barColor = "bg-red-600"; statusText = "น้ำมันหมด"; }
                        else if (percent < 20) { barColor = "bg-yellow-500"; statusText = "น้ำมันใกล้หมด"; }

                        display.innerHTML += `
                            <div class="bg-white rounded-3xl shadow-xl border-t-8 border-${f.color}-500 overflow-hidden">
                                <div class="p-6">
                                    <h3 class="text-lg font-bold text-gray-700 mb-4">${f.name}</h3>
                                    <div class="space-y-2 text-sm mb-6">
                                        <div class="flex justify-between text-gray-400"><span>ยกมา:</span><span>${f.val.prev.toLocaleString()}</span></div>
                                        <div class="flex justify-between text-green-600"><span>รับเพิ่ม:</span><span>+${f.val.rec.toLocaleString()}</span></div>
                                        <div class="flex justify-between text-red-500 border-b pb-2"><span>จำหน่าย:</span><span>-${f.val.sold.toLocaleString()}</span></div>
                                        <div class="flex justify-between items-center pt-2">
                                            <span class="font-bold">คงเหลือ:</span>
                                            <span class="text-2xl font-black text-blue-600">${remain.toLocaleString()}</span>
                                        </div>
                                    </div>
                                    <div class="w-full bg-gray-100 rounded-full h-3 mb-4">
                                        <div class="${barColor} h-3 rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                                    </div>
                                    <div class="${barColor} text-white text-center py-2 rounded-xl text-xs font-bold uppercase shadow-sm">
                                        ${statusText}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                });
        }

        setInterval(updateView, 3000);
        updateView();
    </script>
</body>
</html>
