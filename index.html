<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ปตท.บ้านแฮด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">
    
    <div class="max-w-xl w-full">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-black text-blue-900 mb-2">ปตท.บ้านแฮด</h1>
            <p id="time" class="text-gray-500 italic">กำลังดึงข้อมูล...</p>
        </div>

        <div class="bg-white rounded-[2rem] shadow-2xl p-8 border-b-8 border-blue-600">
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-600 font-bold text-lg">ปริมาณน้ำมันรวมคงเหลือ</span>
                <div id="statusBadge" class="px-4 py-1 rounded-full text-white text-sm font-bold shadow-sm">--</div>
            </div>

            <div class="text-center mb-8">
                <span id="remain" class="text-7xl font-black text-blue-600">0</span>
                <span class="text-2xl font-bold text-gray-400 ml-2">ลิตร</span>
            </div>

            <div class="grid grid-cols-3 gap-2 text-center mb-8">
                <div class="bg-gray-50 p-3 rounded-2xl">
                    <p class="text-xs text-gray-400 mb-1">ยกมา</p>
                    <p id="prevDisplay" class="font-bold text-gray-700">0</p>
                </div>
                <div class="bg-green-50 p-3 rounded-2xl">
                    <p class="text-xs text-green-500 mb-1">รับเพิ่ม</p>
                    <p id="recDisplay" class="font-bold text-green-700">0</p>
                </div>
                <div class="bg-red-50 p-3 rounded-2xl">
                    <p class="text-xs text-red-400 mb-1">จำหน่าย</p>
                    <p id="soldDisplay" class="font-bold text-red-700">0</p>
                </div>
            </div>

            <div class="w-full bg-gray-100 rounded-full h-6 mb-4 overflow-hidden shadow-inner">
                <div id="bar" class="h-full bg-green-500 transition-all duration-1000 shadow-lg" style="width: 0%"></div>
            </div>
            
            <p id="statusText" class="text-center font-bold text-gray-400 uppercase tracking-widest text-sm">ตรวจสอบสถานะ...</p>
        </div>

        <a href="admin.html" class="block text-center mt-10 text-gray-400 hover:text-blue-600 transition text-sm">⚙️ จัดการข้อมูล (Jobber Only)</a>
    </div>

    <script>
        // *** วาง URL ของ Firebase เดียวกับหน้า Admin ***
        const FIREBASE_URL = "https://ptt-ban-had-default-rtdb.asia-southeast1.firebasedatabase.app/total_fuel.json";

        function updateView() {
            fetch(FIREBASE_URL)
                .then(res => res.json())
                .then(data => {
                    if (!data) return;

                    const totalStock = data.prev + data.rec;
                    const remain = totalStock - data.sold;
                    const percent = Math.min((remain / totalStock) * 100, 100) || 0;

                    // อัปเดตตัวเลข
                    document.getElementById('remain').innerText = remain.toLocaleString();
                    document.getElementById('prevDisplay').innerText = data.prev.toLocaleString();
                    document.getElementById('recDisplay').innerText = "+" + data.rec.toLocaleString();
                    document.getElementById('soldDisplay').innerText = "-" + data.sold.toLocaleString();
                    document.getElementById('time').innerText = "อัปเดตล่าสุด: " + data.lastUpdate;

                    // อัปเดตสีและบาร์
                    const bar = document.getElementById('bar');
                    const badge = document.getElementById('statusBadge');
                    const statusT = document.getElementById('statusText');

                    // ตรรกะเช็คสถานะ
                    if (data.status === 'closed') {
                        badge.innerText = "CLOSED";
                        badge.className = "px-4 py-1 rounded-full text-white text-sm font-bold shadow-sm bg-gray-500";
                        statusT.innerText = "ปิดให้บริการ";
                        bar.className = "h-full bg-gray-400 transition-all duration-1000";
                    } else {
                        badge.innerText = "OPEN";
                        badge.className = "px-4 py-1 rounded-full text-white text-sm font-bold shadow-sm bg-green-500";
                        
                        if (remain <= 0) {
                            bar.className = "h-full bg-red-600 animate-pulse";
                            statusT.innerText = "น้ำมันหมด - ไม่พร้อมบริการ";
                        } else if (percent < 20) {
                            bar.className = "h-full bg-yellow-500";
                            statusT.innerText = "น้ำมันใกล้หมด (โปรดเตรียมสำรอง)";
                        } else {
                            bar.className = "h-full bg-green-500";
                            statusT.innerText = "พร้อมให้บริการปกติ";
                        }
                    }
                    bar.style.width = percent + "%";
                });
        }

        setInterval(updateView, 3000);
        updateView();
    </script>
</body>
</html>
