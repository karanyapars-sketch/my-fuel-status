<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ปตท.บ้านแฮด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Kanit', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black text-blue-900 mb-2">ปตท.บ้านแฮด</h1>
            <div id="time" class="text-slate-500 italic text-sm bg-white inline-block px-4 py-1 rounded-full shadow-sm">กำลังโหลด...</div>
        </header>

        <div id="displayArea" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            </div>
    </div>

    <script>
        // *** ใช้ URL เดียวกับหน้า Admin ***
        const FIREBASE_URL = "https://ptt-ban-had-default-rtdb.asia-southeast1.firebasedatabase.app/fuel_summary.json";

        function updateView() {
            fetch(FIREBASE_URL)
                .then(res => res.json())
                .then(data => {
                    if (!data) return;
                    document.getElementById('time').innerText = "ข้อมูลล่าสุด: " + data.lastUpdate;
                    
                    const fuels = [
                        { name: "Diesel (ดีเซล)", val: data.diesel, color: "blue" },
                        { name: "Gasoline (เบนซิน)", val: data.gasoline, color: "orange" }
                    ];

                    const display = document.getElementById('displayArea');
                    display.innerHTML = '';

                    fuels.forEach(f => {
                        const total = f.val.prev + f.val.rec;
                        const remain = total - f.val.sold;
                        const percent = (remain / total) * 100 || 0;
                        
                        let barColor = "bg-green-500";
                        let statusText = "พร้อมให้บริการ";
                        if (remain <= 0) { barColor = "bg-red-600"; statusText = "น้ำมันหมด"; }
                        else if (percent < 20) { barColor = "bg-yellow-500"; statusText = "น้ำมันใกล้หมด"; }

                        display.innerHTML += `
                            <div class="bg-white rounded-[3rem] shadow-2xl border-t-[12px] border-${f.color}-600 p-8 transition-transform hover:scale-105">
                                <h3 class="text-2xl font-black text-slate-700 mb-6 uppercase text-center">${f.name}</h3>
                                
                                <div class="space-y-4 mb-8">
                                    <div class="flex justify-between text-slate-400 text-sm"><span>ยกยอดมา:</span><span>${f.val.prev.toLocaleString()} L</span></div>
                                    <div class="flex justify-between text-emerald-500 font-bold"><span>รับเพิ่ม (+):</span><span>${f.val.rec.toLocaleString()} L</span></div>
                                    <div class="flex justify-between text-rose-500 font-bold border-b pb-4"><span>จำหน่าย (-):</span><span>${f.val.sold.toLocaleString()} L</span></div>
                                    
                                    <div class="text-center pt-4">
                                        <p class="text-slate-400 text-xs mb-1 uppercase tracking-widest">ปริมาณคงเหลือสุทธิ</p>
                                        <p class="text-6xl font-black text-blue-700">${remain.toLocaleString()}</p>
                                        <p class="text-slate-300 font-bold">LITERS</p>
                                    </div>
                                </div>

                                <div class="w-full bg-slate-100 rounded-full h-5 mb-4 overflow-hidden shadow-inner">
                                    <div class="${barColor} h-full rounded-full transition-all duration-1000" style="width: ${percent}%"></div>
                                </div>
                                <div class="${barColor} text-white text-center py-3 rounded-2xl font-black uppercase tracking-tighter shadow-md">
                                    ${statusText}
                                </div>
                            </div>
                        `;
                    });
                });
        }

        setInterval(updateView, 3000);
        updateView();
    </script>
</body>
</html>
